name: CLI Release

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: windows-latest
            target: win-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bundle CLI
        run: pnpm --filter cli bundle

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp cli/dist/theodo-blueprints.cjs release/theodo-blueprints
          chmod +x release/theodo-blueprints
          tar -czf theodo-blueprints-${{ matrix.target }}.tar.gz -C release theodo-blueprints

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          Copy-Item cli/dist/theodo-blueprints.cjs release/theodo-blueprints.cjs
          Compress-Archive -Path release/theodo-blueprints.cjs -DestinationPath theodo-blueprints-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: theodo-blueprints-${{ matrix.target }}
          path: theodo-blueprints-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: theodo-blueprints-*.*
          generate_release_notes: true
